<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Service Blueprint</title>
<style>
  :root{
    --paper:#FAF9F7; --panel:#FFFFFF; --ink:#2E2A26; --ink-soft:#6E675F;
    --grid:#EAE6E0; --lane-band:#F2EFEA;
    --core:#587DA8; --core-soft:#EBF1F6; --core-line:#C2D3E2;
    --dev:#B06A31; --dev-soft:#F8ECDF; --dev-line:#E3BE93;
    --chip:#F0EDE7; --chip-ink:#55504A;
    --rail-w:56px; --fly-w:262px;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --helv:"Helvetica Neue",Helvetica,system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);
    line-height:1.45;font-size:15px}

  /* ---------- left rail (always visible) ---------- */
  .rail{position:fixed;left:0;top:0;bottom:0;width:var(--rail-w);z-index:40;
    background:var(--panel);border-right:1px solid var(--grid);
    display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 0}
  .rail .icon{width:38px;height:38px;border-radius:9px;border:1px solid transparent;
    background:transparent;color:var(--ink-soft);cursor:pointer;display:flex;
    align-items:center;justify-content:center;transition:.15s}
  .rail .icon:hover{background:var(--paper);color:var(--ink)}
  .rail .icon.on{background:var(--core-soft);color:var(--core);border-color:var(--core-line)}
  .rail .icon svg{width:19px;height:19px;stroke:currentColor;stroke-width:1.7;
    fill:none;stroke-linecap:round;stroke-linejoin:round}
  .rail .spacer{flex:1}
  .rail .tip{position:absolute;left:calc(var(--rail-w) + 8px);background:var(--ink);
    color:#fff;font-family:var(--mono);font-size:10.5px;letter-spacing:.03em;
    padding:4px 8px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;
    transform:translateX(-4px);transition:.12s}
  .rail .icon:hover .tip{opacity:1;transform:none}

  /* ---------- flyout panel ---------- */
  .flyout{position:fixed;left:var(--rail-w);top:0;bottom:0;width:var(--fly-w);z-index:39;
    background:var(--panel);border-right:1px solid var(--grid);overflow-y:auto;
    transform:translateX(calc(-1 * (var(--rail-w) + var(--fly-w))));
    transition:transform .22s ease;box-shadow:2px 0 18px rgba(20,30,55,0)}
  body.flyout-open .flyout{transform:none;box-shadow:6px 0 22px rgba(20,30,55,.08)}
  .fly-sec{padding:16px 16px;border-bottom:1px solid var(--grid)}
  .fly-h{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--ink-soft);margin:0 0 11px}
  /* control rows */
  .ctrl{display:flex;align-items:center;gap:10px;width:100%;background:transparent;
    border:1px solid var(--grid);border-radius:9px;padding:9px 11px;cursor:pointer;
    text-align:left;margin-bottom:8px;color:var(--ink);transition:.15s}
  .ctrl:last-child{margin-bottom:0}
  .ctrl:hover{background:var(--paper)}
  .ctrl.on{border-color:var(--core-line);background:var(--core-soft)}
  .ctrl svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.7;fill:none;
    stroke-linecap:round;stroke-linejoin:round;color:var(--ink-soft);flex:none}
  .ctrl.on svg{color:var(--core)}
  .ctrl .lab{flex:1;min-width:0}
  .ctrl .lab b{display:block;font-size:13px;font-weight:600;line-height:1.2}
  .ctrl .lab small{font-family:var(--mono);font-size:10.5px;color:var(--ink-soft);letter-spacing:.02em}
  .ctrl .state{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--ink-soft);border:1px solid var(--grid);border-radius:20px;padding:2px 8px}
  .ctrl.on .state{color:var(--core);border-color:var(--core-line)}

  /* legend */
  .legend{display:flex;flex-direction:column;gap:9px;font-size:12.5px;color:var(--ink-soft)}
  .legend span{display:inline-flex;align-items:center;gap:9px}
  .sw{width:12px;height:12px;border-radius:3px;display:inline-block;flex:none}
  .sw.core{background:var(--core)} .sw.dev{background:var(--dev)}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block;border:1.5px solid var(--ink);flex:none}
  .dot.hi{background:var(--ink)} .dot.med{background:linear-gradient(90deg,var(--ink) 50%,transparent 50%)}
  .dot.lo{border-color:var(--dev);background:transparent}

  /* system inventory */
  .inv{display:flex;flex-direction:column;gap:7px}
  .inv-item{display:flex;align-items:center;gap:10px;border:1px solid var(--grid);
    border-radius:9px;padding:9px 11px;cursor:pointer;background:transparent;text-align:left;
    color:var(--ink);transition:.15s}
  .inv-item:hover{background:var(--paper)}
  .inv-item.on{border-color:var(--core);background:var(--core-soft)}
  .inv-item .glyph{width:26px;height:26px;border-radius:7px;background:var(--chip);
    display:flex;align-items:center;justify-content:center;flex:none}
  .inv-item .glyph svg{width:15px;height:15px;stroke:var(--chip-ink);stroke-width:1.7;
    fill:none;stroke-linecap:round;stroke-linejoin:round}
  .inv-item.on .glyph{background:#fff}
  .inv-item .nm{flex:1;min-width:0}
  .inv-item .nm b{display:block;font-size:13px;font-weight:600;line-height:1.25;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .inv-item .nm small{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--ink-soft)}
  .inv-hint{font-family:var(--mono);font-size:10px;color:var(--ink-soft);
    margin:10px 2px 0;letter-spacing:.02em;line-height:1.5}

  /* ---------- main content ---------- */
  .wrap{margin-left:var(--rail-w);max-width:none;padding:34px 30px 80px;transition:margin-left .22s ease}
  body.flyout-open .wrap{margin-left:calc(var(--rail-w) + var(--fly-w))}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--core);margin:0 0 8px}
  h1{font-size:27px;line-height:1.15;margin:0 0 10px;font-weight:650;letter-spacing:-.01em}
  .meta{color:var(--ink-soft);font-size:13.5px;max-width:78ch}
  .meta .src{font-family:var(--mono);font-size:12px}
  .notes{margin:12px 0 24px;padding:11px 14px;border-left:3px solid var(--core-line);
    background:var(--core-soft);border-radius:0 6px 6px 0;font-size:13px;color:#4A423A;max-width:120ch}

  /* matrix */
  .map-region{position:relative}
  .matrix-scroll{overflow:auto;max-height:70vh;border:1px solid var(--grid);border-radius:11px;background:var(--panel)}
  .matrix{display:grid;min-width:720px;position:relative}
  #connectors{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:1}
  .conn{fill:none;stroke:#8A93A6;stroke-width:1.4}
  .conn.dev{stroke:var(--dev);stroke-width:1.3;stroke-dasharray:4 3}
  body.hide-connectors #connectors{display:none}
  .conn.decision{stroke:#8A93A6}
  .conn-label{font-family:var(--mono);font-size:9.5px;fill:var(--ink-soft);
    paint-order:stroke;stroke:var(--panel);stroke-width:3px;stroke-linejoin:round}
  .step.decision{background:transparent;border:none;box-shadow:none;padding:0;overflow:visible;display:flex;justify-content:center}
  .dmnd-wrap{position:relative;width:190px;height:190px;margin:4px auto;font-family:var(--helv)}
  .dmnd{position:absolute;inset:13%;transform:rotate(45deg);background:#fff;border:1px solid #E8C9A8;border-radius:10px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
  .dchip{position:absolute;top:2px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:5px;
    background:#D07B45;color:#fff;border-radius:5px;padding:4px 7px;white-space:nowrap;z-index:1}
  .dchip .n{font:700 11px/1 var(--helv)} .dchip .l{font:500 9.5px/1 var(--helv);letter-spacing:.02em}
  .dbody{position:absolute;inset:26%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:6px}
  .dbody .q{font:600 12.5px/1.3 var(--helv);color:#1F1E1C}
  .dinspect{all:unset;cursor:pointer;font:500 10px/1 var(--helv);color:#A8683C;border:1px solid #E8C9A8;border-radius:4px;padding:3px 7px}
  .dinspect:hover{background:#F8EFE4}
  .cell{border-right:1px solid var(--grid);border-bottom:1px solid var(--grid);padding:8px;min-height:64px;display:flex;flex-direction:column;gap:16px}
  .cell:last-child{border-right:0}
  .phase-head{position:sticky;top:0;z-index:5;padding:12px;border-bottom:1px solid var(--grid);border-right:1px solid var(--grid);background:var(--panel)}
  .phase-head:last-child{border-right:0}
  .corner{left:0;top:0;z-index:6}
  .phase-n{font-family:var(--mono);font-size:11px;color:var(--core);letter-spacing:.1em}
  .phase-t{font-weight:600;font-size:14px;margin-top:2px}
  .lane-section{position:sticky;left:0;z-index:0;background:var(--core-soft);
    border-top:1px solid var(--core-line);border-bottom:1px solid var(--core-line);
    display:flex;align-items:center;padding:3px 12px;min-height:0}
  .lane-section span{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--core);font-weight:800}
  .lane-label{position:sticky;left:0;z-index:4;background:var(--lane-band);
    border-right:1px solid var(--grid);border-bottom:1px solid var(--grid);
    padding:12px;display:flex;align-items:center}
  .lane-label span{font-family:var(--mono);font-size:11.5px;letter-spacing:.04em;
    text-transform:uppercase;color:var(--ink-soft);font-weight:600}
  .lane-label.h1 span{color:var(--ink);font-weight:700;font-size:12px}
  .lane-label.h2{background:var(--panel)}
  .lane-label.h2 span{padding-left:14px}

  /* step card (design 1a) */
  .step{position:relative;z-index:2;background:#fff;border:1px solid #E4E3E0;border-radius:8px;
    box-shadow:0 1px 2px rgba(0,0,0,.05);overflow:hidden;font-family:var(--helv);transition:opacity .15s,box-shadow .15s}
  .step.is-deviation{border-style:dashed;border-color:var(--dev-line)}
  .card-hd{display:flex;align-items:center;gap:8px;height:28px;padding:0 6px 0 10px;color:#fff}
  .card-hd .n{font:700 12px/1 var(--helv)}
  .card-hd .cat{font:500 10.5px/1 var(--helv);letter-spacing:.02em;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card-hd .ib{all:unset;cursor:pointer;width:20px;height:20px;display:grid;place-items:center;border-radius:4px;color:#fff;font-size:11px}
  .card-hd .ib:hover{background:rgba(255,255,255,.22)}
  .card-bd{padding:12px;display:flex;flex-direction:column;gap:9px}
  .card-bd .title{font:600 13.5px/1.35 var(--helv);color:#1F1E1C}
  .card-bd .desc{font:400 11.5px/1.5 var(--helv);color:#6D6C68}
  .metagrid{display:grid;grid-template-columns:58px 1fr;row-gap:5px;font:400 11px/1.4 var(--helv);color:#3A3936}
  .metagrid .k{color:#9A9994;font-size:10px;letter-spacing:.04em;text-transform:uppercase;padding-top:1px}
  .metagrid .ev{color:#56789A}
  .tags{display:flex;flex-wrap:wrap;gap:4px}
  .tags .t{font:500 10px/1 var(--helv);color:#5C5B57;background:#F0EFEC;border-radius:4px;padding:3px 6px}
  .card-exp{border-top:1px solid #ECEBE8;padding-top:9px;display:none;flex-direction:column;gap:8px}
  .step.expanded .card-exp{display:flex}
  .card-exp .sec .ml{font:600 10px/1 var(--helv);letter-spacing:.06em;color:#9A9994;text-transform:uppercase;margin-bottom:4px}
  .card-exp .sec .tx{font:400 11px/1.5 var(--helv);color:#3A3936}
  .syschips{display:flex;gap:4px;flex-wrap:wrap}
  .syschips .sc{font:500 10px/1 var(--mono);color:#3A3936;border:1px solid #E0DFDC;border-radius:4px;padding:3px 6px}
  .chip{font-family:var(--mono);font-size:10.5px;background:var(--chip);color:var(--chip-ink);border-radius:5px;padding:2px 7px;letter-spacing:.02em}
  .dev-badge{display:flex;align-items:center;justify-content:center;gap:5px;
    font-family:var(--mono);font-size:11px;color:var(--dev);background:var(--dev-soft);
    border:1px solid var(--dev-line);border-radius:6px;padding:3px 8px;cursor:pointer}
  .dev-badge:hover{filter:brightness(.97)} .dev-badge b{font-weight:700}
  .hoff{display:none;position:absolute;top:-8px;left:8px;font-family:var(--mono);font-size:9px;
    letter-spacing:.05em;color:#fff;background:var(--core);border-radius:5px;padding:1px 6px;z-index:3}
  body.show-handoffs .step.handoff-in .hoff{display:inline-block}
  body.show-handoffs .step.handoff-in{outline:2px solid var(--core);outline-offset:-1px}
  body.sys-filter .step{opacity:.32}
  body.sys-filter .step.sys-hit{opacity:1;box-shadow:0 0 0 2px var(--core)}
  /* pain-point band — mirrors the top color header, at the card bottom, in red */
  .card-pain{display:flex;gap:7px;align-items:flex-start;background:#A85043;color:#fff;padding:6px 10px;font:500 10.5px/1.4 var(--helv)}
  .card-pain .pl{flex:none;font:700 9px/1.5 var(--helv);letter-spacing:.09em;text-transform:uppercase;opacity:.85}
  body.hide-pain .card-pain{display:none}

  /* lightbox (design 1a mode 2) */
  .lightbox{position:fixed;inset:0;background:rgba(20,19,17,.45);display:none;place-items:center;z-index:60;padding:24px;font-family:var(--helv)}
  .lightbox.open{display:grid}
  .lb-panel{width:520px;max-width:100%;max-height:88vh;overflow-y:auto;background:#fff;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .lb-hd{display:flex;align-items:center;gap:10px;padding:14px 16px;color:#fff;position:sticky;top:0}
  .lb-hd .n{font:700 14px/1 var(--helv)} .lb-hd .t{font:600 15px/1.2 var(--helv);flex:1}
  .lb-hd .cat{font:600 9.5px/1 var(--helv);letter-spacing:.09em;background:rgba(255,255,255,.2);border-radius:4px;padding:4px 7px;text-transform:uppercase}
  .lb-hd .x{all:unset;cursor:pointer;width:24px;height:24px;display:grid;place-items:center;border-radius:5px;font-size:14px}
  .lb-hd .x:hover{background:rgba(255,255,255,.22)}
  .lb-bd{padding:18px 20px;display:flex;flex-direction:column;gap:14px}
  .lb-bd .desc{font:400 12.5px/1.55 var(--helv);color:#3A3936}
  .lb-tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .lb-tile{background:#F8F7F4;border-radius:8px;padding:9px 11px}
  .lb-tile .k{font:600 9.5px/1 var(--helv);letter-spacing:.07em;color:#9A9994;margin-bottom:4px;text-transform:uppercase}
  .lb-tile .v{font:500 12px/1.3 var(--helv);color:#1F1E1C}
  .lb-sec .ml{font:600 10px/1 var(--helv);letter-spacing:.07em;color:#9A9994;margin-bottom:6px;text-transform:uppercase}
  .lb-sec .tx{font:400 12px/1.6 var(--helv);color:#3A3936}
  .lb-foot{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;border-top:1px solid #EEEDE9;padding-top:12px}

  /* core-only mode */
  .core-only .is-deviation{display:none}
  .core-only .dev-badge{display:none}
  .core-only .exceptions{display:none}

  /* exceptions drawer */
  .exceptions{margin-top:26px}
  .exceptions h2{font-size:13px;font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--dev);margin:0 0 12px}
  .dev-card{border:1px solid var(--dev-line);border-left:4px solid var(--dev);background:var(--dev-soft);
    border-radius:8px;padding:13px 15px;margin-bottom:11px}
  .dev-card.flash{animation:flash 1.1s ease}
  @keyframes flash{0%{box-shadow:0 0 0 0 rgba(183,102,15,.55)}100%{box-shadow:0 0 0 12px rgba(183,102,15,0)}}
  .dev-card .dt{font-weight:650;font-size:14.5px}
  .dev-card .trig{font-size:13px;margin-top:4px}
  .dev-card .trig b{font-family:var(--mono);font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--dev)}
  .dev-card .row{display:flex;flex-wrap:wrap;gap:6px 18px;margin-top:9px;font-size:12px;color:#5b4325}
  .dev-card .row .lab{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--dev);margin-right:5px}
  .dev-steps{margin-top:9px;display:flex;flex-wrap:wrap;gap:6px}
  .dev-steps .chip{background:#fff;border:1px solid var(--dev-line);color:#7a4a12}

  /* minimap */
  .minimap{position:absolute;right:16px;bottom:16px;z-index:20;width:210px;
    background:var(--panel);border:1px solid var(--grid);border-radius:10px;
    box-shadow:0 8px 24px rgba(20,30,55,.16);overflow:hidden;user-select:none}
  .minimap.hidden{display:none}
  .mm-head{display:flex;align-items:center;justify-content:space-between;
    padding:6px 6px 6px 10px;border-bottom:1px solid var(--grid);background:var(--panel)}
  .mm-title{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft)}
  .mm-collapse{border:0;background:transparent;color:var(--ink-soft);cursor:pointer;width:24px;height:22px;
    border-radius:6px;display:flex;align-items:center;justify-content:center}
  .mm-collapse:hover{background:var(--paper);color:var(--ink)}
  .mm-collapse svg{width:14px;height:14px;stroke:currentColor;stroke-width:1.9;fill:none;
    stroke-linecap:round;stroke-linejoin:round;transition:transform .18s}
  .mm-body{position:relative;overflow:hidden;padding:8px;background:#2E2A26;cursor:grab;touch-action:none}
  .mm-body:active{cursor:grabbing}
  .mm-canvas{position:relative}
  .mm-blip{position:absolute;background:#9BB3CC;border-radius:1.5px}
  .mm-blip.dev{background:#DFA579}
  .mm-view{position:absolute;border:1.5px solid #fff;border-radius:2px;
    background:rgba(255,255,255,.05);box-shadow:0 0 0 9999px rgba(15,21,36,.46);pointer-events:none}
  .minimap.collapsed .mm-body{display:none}
  .minimap.collapsed .mm-collapse svg{transform:rotate(180deg)}
  .zoomctl{position:absolute;left:16px;bottom:16px;z-index:20;display:flex;align-items:stretch;
    background:var(--panel);border:1px solid var(--grid);border-radius:9px;overflow:hidden;
    box-shadow:0 6px 20px rgba(20,30,55,.12);font-family:var(--mono);user-select:none}
  .zoomctl button{border:0;background:transparent;color:var(--ink);cursor:pointer;height:30px;font-size:15px;line-height:1}
  .zoomctl #zoom-out,.zoomctl #zoom-in{width:30px}
  .zoomctl #zoom-pct{min-width:54px;font-size:11px;letter-spacing:.02em;color:var(--ink-soft);
    border-left:1px solid var(--grid);border-right:1px solid var(--grid)}
  .zoomctl button:hover{background:var(--paper)}
  .empty{color:#aab0bd;font-family:var(--mono);font-size:11px;text-align:center;padding-top:6px}
  footer{margin-top:34px;font-family:var(--mono);font-size:11px;color:#9aa2b1;letter-spacing:.03em}
  @media (prefers-reduced-motion:reduce){.dev-card.flash{animation:none}.flyout{transition:none}}
  @media (max-width:860px){body.flyout-open .wrap{margin-left:var(--rail-w)}}
</style>
</head>
<body>

<!-- icon templates -->
<svg width="0" height="0" style="position:absolute"><defs>
  <g id="i-menu"><line x1="4" y1="6" x2="16" y2="6"/><line x1="4" y1="10" x2="16" y2="10"/><line x1="4" y1="14" x2="16" y2="14"/></g>
  <g id="i-close"><line x1="5" y1="5" x2="15" y2="15"/><line x1="15" y1="5" x2="5" y2="15"/></g>
  <g id="i-branch"><circle cx="6" cy="5" r="2"/><circle cx="6" cy="15" r="2"/><circle cx="14" cy="10" r="2"/><path d="M6 7v6M6 11h3a3 3 0 0 0 3-2"/></g>
  <g id="i-swap"><path d="M4 8h11l-3-3M16 12H5l3 3"/></g>
  <g id="i-stack"><path d="M4 6h12M4 10h12M4 14h12"/></g>
  <g id="i-mini"><rect x="4" y="5" width="12" height="10" rx="1.5"/><rect x="6" y="7" width="5" height="4" rx="1"/></g>
  <g id="i-flow"><circle cx="5" cy="6" r="1.7"/><circle cx="15" cy="14" r="1.7"/><path d="M5 7.7V11h10V12.3"/></g>
  <g id="i-pain"><path d="M10 3.5l7 12.5H3z"/><path d="M10 8.5v3.2M10 13.6v.1"/></g>

  // system inventory

      "<span class='nm'><b>"+esc(s.name)+"</b><small>"+esc(s.type||"—")+"</small></span>"+
    "</button>").join("");

  // matrix (nested lanes: a thin full-width section header marks where a group starts)
  const lanes=M.lanes||[], phases=M.phases||[];
  const groups=M.lane_groups||[];
  const groupById=Object.fromEntries(groups.map(g=>[g.id,g]));

  let html="<svg id='connectors'></svg><div class='corner phase-head' style='grid-row:1;grid-column:1'></div>";

    });

  // deviations drawer

  // footer
  document.getElementById("footer").textContent=
    "Generated "+(M.meta.generated_at||"")+" · "+(M.steps||[]).length+" steps · "+
    (M.deviations||[]).length+" deviation branch"+((M.deviations||[]).length===1?"":"es")+" · lane model: "+(M.meta.lane_model||"—");

  /* ---------- controls ---------- */
  const railMenu=document.getElementById("rail-menu"), railView=document.getElementById("rail-view"),
        railHoff=document.getElementById("rail-hoff"), railSys=document.getElementById("rail-sys"),
        railFlow=document.getElementById("rail-flow"),

  // lightbox (design 1a mode 2)

  document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeLightbox(); });
  function openLightbox(id){
    const s=(M.steps||[]).find(x=>x.id===id); if(!s)return;

  /* ---------- minimap (StarCraft-style overview + pan) ---------- */
  const scroller=document.getElementById("matrix-scroll"), mEl=document.getElementById("matrix"),
        mm=document.getElementById("minimap"), mmBody=document.getElementById("mm-body"),
        mmCanvas=document.getElementById("mm-canvas"), mmView=document.getElementById("mm-view"),
        mmCollapse=document.getElementById("mm-collapse"), railMini=document.getElementById("rail-mini");
  const MM_W=190;
  let mmHidden=false, mmDrag=false, _layoutT=null, _viewRAF=null;

  function scheduleLayout(delay){clearTimeout(_layoutT);_layoutT=setTimeout(layout,delay||0);}
  function offline(){return mmHidden||mm.classList.contains("collapsed");}
  function layout(){ drawConnectors(); mmLayout(); }

  // ---- orthogonal sequential connectors (straight / right-angle only, never curved) ----
  function connDefs(){
    return "<defs>"+
      "<marker id='cArrow' markerWidth='7' markerHeight='7' refX='5.4' refY='3' orient='auto'><path d='M0,0 L6,3 L0,6 Z' fill='#8A93A6'/></marker>"+
      "<marker id='cArrowDev' markerWidth='7' markerHeight='7' refX='5.4' refY='3' orient='auto'><path d='M0,0 L6,3 L0,6 Z' fill='#B06A31'/></marker>"+
    "</defs>";
  }
  function ortho(a,b,kind,label,loop){
    let pts;
    if(loop){                                       // backward / loop-back → separate line routed beneath both boxes
      const gy=Math.max(a.b,b.b)+16;
      pts=[[a.cx,a.b],[a.cx,gy],[b.cx,gy],[b.cx,b.b]];   // exit bottom magnet, run under, enter bottom magnet
    } else {
      const dx=b.cx-a.cx, dy=b.cy-a.cy;
      if(Math.abs(dx)>=Math.abs(dy)){               // horizontal-dominant → right/left side magnets
        const ax=dx>=0?a.r:a.l, bx=dx>=0?b.l:b.r, mx=(ax+bx)/2;
        pts=[[ax,a.cy],[mx,a.cy],[mx,b.cy],[bx,b.cy]];
      } else {                                       // vertical-dominant → bottom/top side magnets
        const ay=dy>=0?a.b:a.t, by=dy>=0?b.t:b.b, my=(ay+by)/2;
        pts=[[a.cx,ay],[a.cx,my],[b.cx,my],[b.cx,by]];
      }
    }
    const d="M"+pts.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" L");
    const cls="conn"+(kind==="dev"?" dev":kind==="decision"?" decision":"")+(loop?" loop":"");
    let out="<path class='"+cls+"' d='"+d+"' marker-end='url(#cArrow"+(kind==="dev"?"Dev":"")+")'/>";
    if(label){
      const lx=(pts[0][0]+pts[1][0])/2, ly=(pts[0][1]+pts[1][1])/2;
      out+="<text class='conn-label' x='"+lx.toFixed(1)+"' y='"+(ly-3).toFixed(1)+"' text-anchor='middle'>"+esc(label)+"</text>";
    }
    return out;
  }
  function drawConnectors(){
    const svg=document.getElementById("connectors"); if(!svg)return;
    const mr=mEl.getBoundingClientRect(); if(!mr.width||!mr.height){svg.innerHTML="";return;}
    const box=el=>{const r=el.getBoundingClientRect(); if(!r.width&&!r.height)return null;
      return {l:r.left-mr.left,t:r.top-mr.top,r:r.right-mr.left,b:r.bottom-mr.top,
              cx:r.left-mr.left+r.width/2,cy:r.top-mr.top+r.height/2};};
    const find=id=>mEl.querySelector('[data-id="'+id+'"]');
    const decisionIds=new Set((M.steps||[]).filter(s=>s.kind==="decision").map(s=>s.id));
    let edges=(M.connections&&M.connections.length)
      ? M.connections.filter(c=>!decisionIds.has(c.from)).map(c=>({from:c.from,to:c.to,kind:"core"}))
      : (()=>{const cs=(M.steps||[]).filter(s=>s.variant==="core").sort((a,b)=>(a.order||0)-(b.order||0));
              const e=[];for(let i=0;i<cs.length-1;i++){if(decisionIds.has(cs[i].id))continue;e.push({from:cs[i].id,to:cs[i+1].id,kind:"core"});}return e;})();
    (M.steps||[]).filter(s=>s.kind==="decision").forEach(dn=>(dn.branches||[]).forEach(br=>{
      edges.push({from:dn.id,to:br.to,kind:"decision",label:br.label});
    }));
    (M.deviations||[]).forEach(d=>(d.steps||[]).forEach(sid=>{
      if(d.branch_from)edges.push({from:d.branch_from,to:sid,kind:"dev"});
      if(d.rejoin_at)edges.push({from:sid,to:d.rejoin_at,kind:"dev"});
    }));
    const orderOf={}; (M.steps||[]).forEach(s=>orderOf[s.id]=(s.order!=null?s.order:0));
    let paths="";
    edges.forEach(e=>{const A=find(e.from),B=find(e.to);if(!A||!B)return;const a=box(A),b=box(B);if(!a||!b)return;
      const loop=orderOf[e.to]<orderOf[e.from];      // target earlier in sequence → loop-back
      paths+=ortho(a,b,e.kind,e.label,loop);});
    svg.setAttribute("viewBox","0 0 "+mr.width.toFixed(1)+" "+mr.height.toFixed(1));
    svg.setAttribute("preserveAspectRatio","none");
    svg.innerHTML=connDefs()+paths;
  }

  function mmLayout(){
    if(offline())return;
    const mr=mEl.getBoundingClientRect();
    if(!mr.width||!mr.height)return;
    const ch=Math.max(64,Math.min(150,Math.round(MM_W*mr.height/mr.width)));
    mmCanvas.style.width=MM_W+"px"; mmCanvas.style.height=ch+"px";
    mmCanvas.innerHTML="";
    document.querySelectorAll("#matrix .step").forEach(st=>{
      const r=st.getBoundingClientRect();
      if(!r.width&&!r.height)return;                 // skip hidden steps (core-only mode)
      const b=document.createElement("div");
      b.className="mm-blip"+(st.classList.contains("is-deviation")?" dev":"");
      b.style.left=((r.left-mr.left)/mr.width*MM_W)+"px";
      b.style.top=((r.top-mr.top)/mr.height*ch)+"px";
      b.style.width=Math.max(2,r.width/mr.width*MM_W)+"px";
      b.style.height=Math.max(2,r.height/mr.height*ch)+"px";
      mmCanvas.appendChild(b);
    });
    updateView();
  }
  function updateView(){
    if(offline())return;
    const fW=scroller.scrollWidth,fH=scroller.scrollHeight,vW=scroller.clientWidth,vH=scroller.clientHeight,
          cw=mmCanvas.offsetWidth,cvh=mmCanvas.offsetHeight;
    mmView.style.left=(scroller.scrollLeft/fW*cw)+"px";
    mmView.style.top=(scroller.scrollTop/fH*cvh)+"px";
    mmView.style.width=Math.min(cw,vW/fW*cw)+"px";
    mmView.style.height=Math.min(cvh,vH/fH*cvh)+"px";
  }
  function panTo(x,y){
    const rect=mmCanvas.getBoundingClientRect();
    scroller.scrollLeft=(x-rect.left)/rect.width*scroller.scrollWidth-scroller.clientWidth/2;
    scroller.scrollTop=(y-rect.top)/rect.height*scroller.scrollHeight-scroller.clientHeight/2;
  }
  mmBody.addEventListener("pointerdown",e=>{mmDrag=true;mmBody.setPointerCapture(e.pointerId);panTo(e.clientX,e.clientY);});
  mmBody.addEventListener("pointermove",e=>{if(mmDrag)panTo(e.clientX,e.clientY);});
  mmBody.addEventListener("pointerup",()=>{mmDrag=false;});
  mmBody.addEventListener("pointercancel",()=>{mmDrag=false;});
  scroller.addEventListener("scroll",()=>{if(_viewRAF)return;_viewRAF=requestAnimationFrame(()=>{_viewRAF=null;updateView();});});
  window.addEventListener("resize",()=>scheduleLayout(0));
  mmCollapse.onclick=()=>{const collapsed=mm.classList.toggle("collapsed");if(!collapsed)scheduleLayout(0);};
  railMini.onclick=()=>{mmHidden=!mmHidden;mm.classList.toggle("hidden",mmHidden);
    railMini.classList.toggle("on",!mmHidden);if(!mmHidden){mm.classList.remove("collapsed");scheduleLayout(0);}};
  window.addEventListener("load",()=>scheduleLayout(0));

  /* ---------- zoom (Ctrl/Cmd + wheel or pinch, Ctrl/Cmd +/-/0, on-canvas buttons) ---------- */
  let zoom=1; const ZMIN=0.4, ZMAX=2.6;
  const zPct=document.getElementById("zoom-pct");
  function applyZoom(z, clientX, clientY){
    z=Math.max(ZMIN, Math.min(ZMAX, Math.round(z*100)/100));
    if(z===zoom) return;
    const rect=scroller.getBoundingClientRect();
    const fx=(clientX==null?scroller.clientWidth/2:clientX-rect.left);
    const fy=(clientY==null?scroller.clientHeight/2:clientY-rect.top);
    const cx=(scroller.scrollLeft+fx)/zoom;      // content point under the focal point
    const cy=(scroller.scrollTop+fy)/zoom;
    zoom=z; mEl.style.zoom=zoom;
    scroller.scrollLeft=cx*zoom-fx;              // keep that content point under the cursor
    scroller.scrollTop=cy*zoom-fy;
    if(zPct) zPct.textContent=Math.round(zoom*100)+"%";
    updateView();                                 // refresh minimap viewport rectangle
  }
  scroller.addEventListener("wheel",e=>{
    if(!(e.ctrlKey||e.metaKey)) return;           // plain wheel/trackpad = scroll; modifier or pinch = zoom
    e.preventDefault();
    applyZoom(zoom*(e.deltaY<0?1.12:1/1.12), e.clientX, e.clientY);
  },{passive:false});
  document.addEventListener("keydown",e=>{
    if(!(e.ctrlKey||e.metaKey)) return;
    if(e.key==="+"||e.key==="="){e.preventDefault();applyZoom(zoom*1.12);}
    else if(e.key==="-"||e.key==="_"){e.preventDefault();applyZoom(zoom/1.12);}
    else if(e.key==="0"){e.preventDefault();applyZoom(1);}
  });
  document.getElementById("zoom-in").onclick=()=>applyZoom(zoom*1.12);
  document.getElementById("zoom-out").onclick=()=>applyZoom(zoom/1.12);
  zPct.onclick=()=>applyZoom(1);

  setView(true); setHoff(false); setFlow(true); setPain(true); setFly(true); // open flyout by default so controls are discoverable
  scheduleLayout(80);

  /* ---------- builders ---------- */
  function catOf(laneId){const l=laneById[laneId]||{};
    if(l.group){const g=groupById[l.group]||{};return {label:g.label||l.group,color:g.color||"#587DA8"};}
    return {label:l.label||"",color:l.color||"#587DA8"};}
  function evText(ev){return typeof ev==="string"?ev:(ev&&ev[0]&&(ev[0].ref||ev[0].transcript))||"";}
  function ppText(pp){return Array.isArray(pp)?pp.join(" · "):(pp||"");}

  function stepCard(s){
    if(s.kind==="decision") return decisionCard(s);
    const cat=catOf(s.lane);
    const devs=devByFrom[s.id]||[];
    const count=devs.reduce((n,d)=>n+((d.steps&&d.steps.length)||1),0);
    const badge=devs.length?("<div class='dev-badge' data-dev='"+devs[0].id+"'>⚠ <b>"+count+"</b> exception"+(count>1?"s":"")+" here</div>"):"";
    const meta=[];
    if(s.actor)meta.push("<span class='k'>Actor</span><span>"+esc(s.actor)+"</span>");
    if(s.duration)meta.push("<span class='k'>Time</span><span>"+esc(s.duration)+"</span>");
    if(s.channel)meta.push("<span class='k'>Channel</span><span>"+esc(s.channel)+"</span>");
    if(evText(s.evidence))meta.push("<span class='k'>Evidence</span><span class='ev'>"+esc(evText(s.evidence))+" ↗</span>");
    const tags=(s.tags||[]).map(t=>"<span class='t'>"+esc(t)+"</span>").join("");
    const sysChips=(s.systems||[]).map(id=>"<span class='sc'>"+esc((sysById[id]&&sysById[id].name)||id)+"</span>").join("");
    const pp=ppText(s.pain_points);
    const expInner=
      (sysChips?"<div class='sec'><div class='ml'>Backstage systems</div><div class='syschips'>"+sysChips+"</div></div>":"")+
      (s.success_metric?"<div class='sec'><div class='ml'>Success metric</div><div class='tx'>"+esc(s.success_metric)+"</div></div>":"");
    const painBand=pp?("<div class='card-pain'><span class='pl'>Pain</span><span>"+esc(pp)+"</span></div>"):"";
    return "<div class='step"+(s.variant==="deviation"?" is-deviation":"")+(handoffTargets.has(s.id)?" handoff-in":"")+"' data-id='"+esc(s.id)+"' data-systems='"+esc((s.systems||[]).join(","))+"'>"+
      "<span class='hoff'>handoff</span>"+
      "<div class='card-hd' style='background:"+esc(cat.color)+"'>"+
        "<span class='n'>"+esc(lab(s.id))+"</span>"+
        "<span class='cat'>"+esc(cat.label)+"</span>"+
        (expInner?"<button class='ib card-exp-btn' title='Expand'>▾</button>":"")+
        "<button class='ib card-box-btn' data-step='"+esc(s.id)+"' title='Open detail'>⤢</button>"+
      "</div>"+
      "<div class='card-bd'>"+
        "<div class='title'>"+esc(s.name)+"</div>"+
        (s.description?"<div class='desc'>"+esc(s.description)+"</div>":"")+
        (meta.length?"<div class='metagrid'>"+meta.join("")+"</div>":"")+
        (tags?"<div class='tags'>"+tags+"</div>":"")+
        (expInner?"<div class='card-exp'>"+expInner+"</div>":"")+
        badge+
      "</div>"+
      painBand+
    "</div>";
  }
  function devCard(d){
    const stepChips=(d.steps||[]).map(id=>{const st=(M.steps||[]).find(x=>x.id===id);return (lab(id)?lab(id)+" · ":"")+(st?st.name:id);});
    const rj=d.rejoin_at?((M.steps||[]).find(x=>x.id===d.rejoin_at)||{}):null;
    const rejoin=rj?((lab(d.rejoin_at)?lab(d.rejoin_at)+" · ":"")+(rj.name||"")):null;
    return "<div class='dev-card' id='devcard-"+d.id+"'>"+
      "<div class='dt'>"+esc(d.label||"Deviation")+"</div>"+
      "<div class='trig'><b>Trigger:</b> "+esc(d.trigger||"—")+"</div>"+
      (stepChips.length?"<div class='dev-steps'>"+stepChips.map(n=>"<span class='chip'>"+esc(n)+"</span>").join("")+"</div>":"")+
      "<div class='row'>"+
        (d.frequency_note?"<span><span class='lab'>Frequency</span>"+esc(d.frequency_note)+"</span>":"")+
        (d.impact?"<span><span class='lab'>Impact</span>"+esc(d.impact)+"</span>":"")+
        (rejoin?"<span><span class='lab'>Rejoins at</span>"+esc(rejoin)+"</span>":"")+
        ((d.occurs_in||[]).length?"<span><span class='lab'>Seen in</span>"+d.occurs_in.map(esc).join(", ")+"</span>":"")+
      "</div></div>";
  }
  function confClass(c){return c==="high"?"hi":c==="low"?"lo":"med";}
  function decisionCard(s){
    return "<div class='step decision' data-systems='"+esc((s.systems||[]).join(","))+"'>"+
      "<div class='dmnd-wrap'>"+
        "<div class='dmnd' data-id='"+esc(s.id)+"'></div>"+
        "<div class='dchip'><span class='n'>"+esc(lab(s.id)||"")+"</span><span class='l'>Decision</span></div>"+
        "<div class='dbody'>"+
          "<div class='q'>"+esc(s.name)+"</div>"+
          "<button class='dinspect card-box-btn' data-step='"+esc(s.id)+"'>⤢ inspect</button>"+
        "</div>"+
      "</div>"+
    "</div>";
  }
  function esc(x){return String(x==null?"":x).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}
})();
</script>
</body>
</html>
